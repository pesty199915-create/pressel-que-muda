    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      width: 100%;
      overflow: hidden;
      background: #09090d;
    }

    body {
      position: relative;
      min-height: 100vh;
      color: var(--text);
      font-family: var(--font-family);
      display: grid;
      place-items: center;
    }

    .scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(var(--bg-angle), var(--bg1) 0%, var(--bg2) 32%, var(--bg3) 66%, var(--bg4) 100%);

    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--page-overlay);
      pointer-events: none;
    }

    #bgLayer {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .wrap {
      position: relative;
      z-index: 20;
      width: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .cta-btn {
      position: relative;
      width: min(var(--button-width), calc(100vw - 40px));
      min-height: var(--button-height);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      gap: 12px;
      padding: var(--button-padding);
      border-radius: var(--button-radius);
      text-decoration: none;
      color: var(--text);
      background: var(--button-bg);
      border: var(--button-border-width) var(--button-border-style) var(--outline);
      font-size: clamp(18px, 2.9vw, var(--button-font-size));
      font-weight: var(--button-weight);
      text-transform: var(--button-transform);
      letter-spacing: var(--button-spacing);
      transform: rotate(var(--button-rotate));
      box-shadow: var(--button-shadow);
      transition: transform .2s ease, filter .2s ease, box-shadow .25s ease;
      overflow: hidden;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .cta-btn:hover {
      transform: rotate(var(--button-rotate)) translateY(-2px) scale(1.03);
      filter: brightness(1.06);
    }

    .cta-btn:active {
      transform: rotate(var(--button-rotate)) scale(0.985);
    }

    .cta-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(
        115deg,
        transparent 0%,
        transparent 34%,
        rgba(255,255,255,.18) 46%,
        transparent 58%,
        transparent 100%
      );
      transform: translateX(-120%);
      animation: shine 3.1s linear infinite;
    }

    .cta-btn::after {
      content: "";
      position: absolute;
      inset: 1px;
      border-radius: inherit;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16);
      pointer-events: none;
    }

    .btn-inner {
      position: relative;
      z-index: 2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;

      filter: drop-shadow(0 2px 8px rgba(0,0,0,.35));
    }

    .scene-fill,
    .orb,
    .triangle,
    .bar,
    .ring,
    .square,
    .band,
    .panel,
    .mesh-line,
    .node,
    .cross,
    .beam,
    .halo,
    .shard {
      position: absolute;
    }

      border-radius: 999px;
      filter: blur(42px);
      opacity: .24;

    .triangle {

      height: 0;
      opacity: .12;
      filter: blur(1px);
      animation: floatSlow 18s ease-in-out infinite;
    }

    .bar {
      height: 2px;
      opacity: .12;
      transform-origin: left center;
      animation: drift 15s ease-in-out infinite;
      filter: blur(.4px);
    }

    .ring {
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.10);
      animation: pulseRing 4s ease-in-out infinite;
      opacity: .18;
    }

    .square {
      border-radius: 24px;
      opacity: .14;
      filter: blur(2px);
      animation: drift 15s ease-in-out infinite;
    }

    .band {
      border-radius: 999px;
      opacity: .28;
      filter: blur(36px);
      animation: drift 17s ease-in-out infinite;
    }

    .panel {
      border: 1px solid rgba(255,255,255,.08);
      background: rgba(255,255,255,.03);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 12px 40px rgba(0,0,0,.30);

      animation: floatSlow 16s ease-in-out infinite;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .mesh-line {
      height: 1px;
      opacity: .14;
      transform-origin: left center;
      filter: blur(.2px);
    }

    .node {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      opacity: .72;
      box-shadow: 0 0 16px currentColor;
    }

    .cross {
      width: 42px;
      height: 42px;
      opacity: .15;
      animation: pulseSoft 3.4s ease-in-out infinite;
    }

    .cross::before,
    .cross::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      background: currentColor;
      transform: translate(-50%, -50%);
      border-radius: 999px;
    }

    .cross::before { width: 42px; height: 2px; }
    .cross::after { width: 2px; height: 42px; }

    .beam {
      top: -10%;
      height: 120%;
      filter: blur(18px);
      opacity: .16;
      animation: beamShift 12s ease-in-out infinite;
    }

    .halo {
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.08);
      opacity: .14;
      animation: pulseRing 5s ease-in-out infinite;
      filter: blur(.3px);

    .shard {

      height: 34px;
      opacity: .14;

    function getAllParams() {
      const urlParams = new URLSearchParams(window.location.search);

      const paramKeys = [

          params[key] = value;
          if (params[key].startsWith('__') && params[key].endsWith('__')) {
            params[key] = '';
          }
        }
      });
      
      return params;

    function getCampaignName() {

      const possibleNames = [
        params.cname,
        params.CampaignID,
        params.campaign,
        params.utm_campaign,
        params.source,
        params.utm_source
      ];
      
      for (let i = 0; i < possibleNames.length; i++) {
        const name = possibleNames[i];

          return campaign;

      }

      }

    function randomFloat() {
      if (window.crypto && crypto.getRandomValues) {
        const arr = new Uint32Array(1);
        crypto.getRandomValues(arr);
        return arr[0] / 4294967295;
      }
      return Math.random();
    }

    function rand(max) {
      return Math.floor(randomFloat() * max);
    }

    function pick(arr) {
      return arr[rand(arr.length)];
    }

    function hexToRgba(hex, alpha) {
      let h = hex.replace("#", "");
      if (h.length === 3) {
        h = h.split("").map(c => c + c).join("");
      }
      const r = parseInt(h.substring(0, 2), 16);
      const g = parseInt(h.substring(2, 4), 16);
      const b = parseInt(h.substring(4, 6), 16);
      return "rgba(" + r + ", " + g + ", " + b + ", " + alpha + ")";
    }

    function setVar(name, value) {
      document.documentElement.style.setProperty(name, value);
    }

    function getRecent(key) {
      try {
        return JSON.parse(localStorage.getItem(key) || "[]");
      } catch (e) {
        return [];
      }
    }

    function pushRecent(key, value, limit) {
      const current = getRecent(key).filter(v => v !== value);
      current.unshift(value);
      localStorage.setItem(key, JSON.stringify(current.slice(0, limit)));
    }

    function chooseWithoutRecent(arr, recent, keyFn = item => item) {
      const filtered = arr.filter(item => !recent.includes(keyFn(item)));
      return filtered.length ? pick(filtered) : pick(arr);
    }

    function createDiv(className, styles = {}) {
      const el = document.createElement("div");
      el.className = className;
      Object.assign(el.style, styles);
      return el;
    }

    function setMask(el, value) {
      el.style.maskImage = value;
      el.style.webkitMaskImage = value;
    }

    function applyUniverse(universe) {
      setVar("--bg1", universe.bg[0]);
      setVar("--bg2", universe.bg[1]);
      setVar("--bg3", universe.bg[2]);
      setVar("--bg4", universe.bg[3]);
      setVar("--bg-angle", universe.bgAngle);

      setVar("--accent1", universe.accent[0]);
      setVar("--accent2", universe.accent[1]);
      setVar("--accent3", universe.accent[2]);

      setVar("--text", universe.text);
      setVar("--outline", universe.outline);
      setVar("--page-overlay", universe.vignette);
      setVar("--font-family", universe.font);

      setVar("--button-width", universe.button.width);
      setVar("--button-height", universe.button.height);
      setVar("--button-radius", universe.button.radius);
      setVar("--button-font-size", universe.button.fontSize);
      setVar("--button-weight", universe.button.weight);
      setVar("--button-transform", universe.button.transform);
      setVar("--button-spacing", universe.button.spacing);
      setVar("--button-border-width", universe.button.borderWidth);
      setVar("--button-border-style", universe.button.borderStyle);
      setVar("--button-rotate", universe.button.rotate);
      setVar("--button-padding", universe.button.padding);

      const shadowA = hexToRgba(universe.accent[0], 0.32);
      const shadowB = hexToRgba(universe.accent[1], 0.22);
      const shadowC = "rgba(0,0,0,.60)";

      setVar(
        "--button-shadow",
        "0 0 " + (28 + rand(24)) + "px " + shadowA + ", 0 0 " + (48 + rand(40)) + "px " + shadowB + ", 0 " + (18 + rand(14)) + "px " + (54 + rand(24)) + "px " + shadowC
      );

      setVar(
        "--button-bg",
        "linear-gradient(" + universe.btnAngle + ", " + universe.accent[0] + " 0%, " + universe.accent[1] + " 55%, " + universe.accent[2] + " 100%)"
      );
    }

    function addAmbientGlows(layer, universe) {
      const positions = [
        { left: "18%", top: "22%" },
        { left: "78%", top: "70%" },
        { left: "54%", top: "48%" }
      ];

      positions.forEach((pos, index) => {
        const color = universe.accent[index % universe.accent.length];
        const size = 220 + rand(180);
        layer.appendChild(createDiv("orb", {
          width: size + "px",
          height: size + "px",
          left: pos.left,
          top: pos.top,
          background: color,
          opacity: (0.12 + randomFloat() * 0.10).toFixed(2),
          filter: "blur(" + (44 + rand(26)) + "px)",
          animationDuration: (12 + rand(8)) + "s",
          animationDelay: (-rand(8)) + "s"
        }));
      });
    }

    function buildVelvetOrbs(layer, universe) {
      const count = 7 + rand(6);
      for (let i = 0; i < count; i++) {
        const size = 110 + rand(220);
        layer.appendChild(createDiv("orb", {
          width: size + "px",
          height: size + "px",
          left: rand(96) + "%",
          top: rand(96) + "%",
          background: pick(universe.accent),
          opacity: (0.12 + randomFloat() * 0.14).toFixed(2),
          filter: "blur(" + (36 + rand(28)) + "px)",
          animationDuration: (12 + rand(10)) + "s",
          animationDelay: (-rand(10)) + "s"
        }));
      }
    }

    function buildCyberGrid(layer, universe) {
      const grid = createDiv("scene-fill", {
        backgroundImage:
          "linear-gradient(" + hexToRgba(universe.accent[0], 0.12) + " 1px, transparent 1px), linear-gradient(90deg, " + hexToRgba(universe.accent[1], 0.10) + " 1px, transparent 1px)",
        backgroundSize: (34 + rand(18)) + "px " + (34 + rand(18)) + "px",
        opacity: ".18"
      });
      setMask(grid, "radial-gradient(circle at center, black 30%, transparent 82%)");
      layer.appendChild(grid);

      for (let i = 0; i < 5 + rand(4); i++) {
        const size = 90 + rand(160);
        layer.appendChild(createDiv("orb", {
          width: size + "px",
          height: size + "px",
          left: rand(96) + "%",
          top: rand(96) + "%",
          background: pick(universe.accent),
          opacity: (0.10 + randomFloat() * 0.10).toFixed(2),
          filter: "blur(" + (28 + rand(22)) + "px)",
          animationDuration: (10 + rand(8)) + "s"
        }));

    }

    function buildDiagonalBars(layer, universe) {

        opacity: ".16"
      });
      setMask(stripes, "radial-gradient(circle at center, black 30%, transparent 82%)");
      layer.appendChild(stripes);

      for (let i = 0; i < 9 + rand(6); i++) {
        layer.appendChild(createDiv("bar", {

          borderLeft: (size / 2) + "px solid transparent",
          borderRight: (size / 2) + "px solid transparent",

    function buildEchoRings(layer, universe) {

    function buildSpotlightMinimal(layer, universe) {
      const spotA = createDiv("scene-fill", {

      const spotB = createDiv("scene-fill", {
        background: "radial-gradient(circle at 78% 70%, " + hexToRgba(universe.accent[1], 0.18) + " 0%, transparent 26%)",
        filter: "blur(10px)"
      });
      const spotC = createDiv("scene-fill", {
        background: "radial-gradient(circle at 50% 50%, " + hexToRgba(universe.accent[2], 0.10) + " 0%, transparent 20%)",
        filter: "blur(8px)"
      });

      layer.appendChild(spotA);
      layer.appendChild(spotB);

      for (let i = 0; i < 3 + rand(3); i++) {
        const size = 180 + rand(180);
        layer.appendChild(createDiv("ring", {
          width: size + "px",
          height: size + "px",
          left: rand(100) + "%",
          top: rand(100) + "%",
          borderColor: hexToRgba(pick(universe.accent), 0.16),
          animationDuration: (4 + randomFloat() * 3).toFixed(2) + "s"
        }));
      }
    }

    function buildMatrixDots(layer, universe) {
      const dots = createDiv("scene-fill", {
        backgroundImage: "radial-gradient(" + hexToRgba(universe.accent[1], 0.44) + " 0.8px, transparent 0.8px)",

        opacity: ".16"
      });
      setMask(dots, "radial-gradient(circle at center, black 24%, transparent 80%)");
      layer.appendChild(dots);

      for (let i = 0; i < 6 + rand(5); i++) {
        const size = 70 + rand(130);
        layer.appendChild(createDiv("orb", {
          width: size + "px",

          left: rand(100) + "%",
          top: rand(100) + "%",

        }));

    }

    function buildGlassPanels(layer, universe) {
      const count = 7 + rand(6);
      for (let i = 0; i < count; i++) {
        layer.appendChild(createDiv("panel", {
          width: (80 + rand(180)) + "px",
          height: (60 + rand(140)) + "px",
          left: rand(100) + "%",
          top: rand(100) + "%",
          transform: "rotate(" + (rand(50) - 25) + "deg)",
          borderColor: hexToRgba(pick(universe.accent), 0.18),
          background: "linear-gradient(145deg, " + hexToRgba(pick(universe.accent), 0.08) + ", rgba(255,255,255,0.02))",
          animationDuration: (13 + rand(8)) + "s",
          animationDelay: (-rand(8)) + "s"
        }));
      }
    }

    function buildMeshLinks(layer, universe) {
      const points = [];
      const total = 8 + rand(4);

      for (let i = 0; i < total; i++) {
        const x = 10 + rand(80);
        const y = 10 + rand(80);
        const color = pick(universe.accent);
        points.push({ x, y, color });
      }

      for (let i = 0; i < points.length; i++) {
        const point = points[i];
        layer.appendChild(createDiv("node", {
          left: point.x + "%",
          top: point.y + "%",
          color: point.color,
          background: point.color
        }));

        const next = points[(i + 1) % points.length];
        const dx = next.x - point.x;
        const dy = next.y - point.y;
        const length = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx) * (180 / Math.PI);

        layer.appendChild(createDiv("mesh-line", {
          left: point.x + "%",
          top: point.y + "%",
          width: length + "%",
          background: hexToRgba(point.color, 0.26),
          transform: "rotate(" + angle + "deg)"
        }));
      }
    }

    function buildNeonCrosses(layer, universe) {
      const count = 9 + rand(8);
      for (let i = 0; i < count; i++) {
        const size = 28 + rand(30);
        layer.appendChild(createDiv("cross", {
          left: rand(100) + "%",
          top: rand(100) + "%",
          color: pick(universe.accent),
          width: size + "px",
          height: size + "px",
          animationDuration: (2.8 + randomFloat() * 2.4).toFixed(2) + "s"
        }));
      }
    }

    function buildVerticalBeams(layer, universe) {
      const count = 5 + rand(4);
      for (let i = 0; i < count; i++) {
        layer.appendChild(createDiv("beam", {
          width: (40 + rand(80)) + "px",
          left: rand(100) + "%",
          background: "linear-gradient(180deg, transparent 0%, " + hexToRgba(pick(universe.accent), 0.55) + " 30%, " + hexToRgba(pick(universe.accent), 0.18) + " 70%, transparent 100%)",
          animationDuration: (8 + rand(8)) + "s"
        }));
      }
    }

    function buildRadialHalos(layer, universe) {
      const count = 6 + rand(5);
      for (let i = 0; i < count; i++) {
        const size = 120 + rand(260);
        layer.appendChild(createDiv("halo", {
          width: size + "px",
          height: size + "px",
          left: rand(100) + "%",
          top: rand(100) + "%",
          borderColor: hexToRgba(pick(universe.accent), 0.20),
          boxShadow: "0 0 30px " + hexToRgba(pick(universe.accent), 0.18),
          animationDuration: (3.6 + randomFloat() * 2.8).toFixed(2) + "s"
        }));
      }
    }

    function buildShardsMix(layer, universe) {
      const count = 10 + rand(8);
      for (let i = 0; i < count; i++) {
        layer.appendChild(createDiv("shard", {
          left: rand(100) + "%",
          top: rand(100) + "%",
          background: "linear-gradient(90deg, " + hexToRgba(pick(universe.accent), 0.60) + ", " + hexToRgba(pick(universe.accent), 0.18) + ")",
          transform: "rotate(" + rand(180) + "deg)",
          animationDuration: (12 + rand(8)) + "s"
        }));
      }

      for (let i = 0; i < 5 + rand(4); i++) {
        layer.appendChild(createDiv("bar", {
          width: (100 + rand(260)) + "px",
          left: rand(100) + "%",
          top: rand(100) + "%",
          background: pick(universe.accent),
          transform: "rotate(" + rand(180) + "deg)",
          boxShadow: "0 0 14px " + pick(universe.accent)
        }));
      }
    }

    function buildScene(universe) {
      const layer = document.getElementById("bgLayer");
      layer.innerHTML = "";
      addAmbientGlows(layer, universe);

      if (universe.scene === "velvetOrbs") buildVelvetOrbs(layer, universe);
      if (universe.scene === "cyberGrid") buildCyberGrid(layer, universe);
      if (universe.scene === "diagonalBars") buildDiagonalBars(layer, universe);
      if (universe.scene === "prismTriangles") buildPrismTriangles(layer, universe);
      if (universe.scene === "echoRings") buildEchoRings(layer, universe);
      if (universe.scene === "softSquares") buildSoftSquares(layer, universe);
      if (universe.scene === "auroraBands") buildAuroraBands(layer, universe);
      if (universe.scene === "spotlightMinimal") buildSpotlightMinimal(layer, universe);
      if (universe.scene === "matrixDots") buildMatrixDots(layer, universe);
      if (universe.scene === "glassPanels") buildGlassPanels(layer, universe);
      if (universe.scene === "meshLinks") buildMeshLinks(layer, universe);
      if (universe.scene === "neonCrosses") buildNeonCrosses(layer, universe);
      if (universe.scene === "verticalBeams") buildVerticalBeams(layer, universe);
      if (universe.scene === "radialHalos") buildRadialHalos(layer, universe);
      if (universe.scene === "shardsMix") buildShardsMix(layer, universe);
    }

    function init() {
      const recentUniverses = getRecent("recent_universes");
      const recentCTAs = getRecent("recent_ctas");
      const recentLeft = getRecent("recent_emojis_left");
      const recentRight = getRecent("recent_emojis_right");

      const universe = chooseWithoutRecent(UNIVERSES, recentUniverses, item => item.id);
      const cta = chooseWithoutRecent(CTAS, recentCTAs);
      const leftEmoji = chooseWithoutRecent(EMOJIS, recentLeft);
      const rightEmoji = chooseWithoutRecent(EMOJIS.filter(e => e !== leftEmoji), recentRight);

      applyUniverse(universe);
      buildScene(universe);

      document.getElementById("ctaText").textContent = cta;
      document.getElementById("emojiLeft").textContent = leftEmoji;
      document.getElementById("emojiRight").textContent = rightEmoji;

      updateButtonLink();

      pushRecent("recent_universes", universe.id, 5);
      pushRecent("recent_ctas", cta, 5);
      pushRecent("recent_emojis_left", leftEmoji, 3);
      pushRecent("recent_emojis_right", rightEmoji, 3);
    }

    init();
  </script>
